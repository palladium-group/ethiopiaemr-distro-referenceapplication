name: Build & Deploy
run-name: "${{ github.event_name == 'workflow_dispatch' && format('Manual deploy · {0} by @{1}', github.ref_name, github.actor) || ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/pipeline-fix') && format('Deploy latest · {0} by @{1}', github.ref_name, github.actor) || format('Deploy prod · {0} by @{1}', github.ref_name, github.actor)) }}"

on:
  push:
    branches: [main, feature/pipeline-fix]
    tags:
      - "*prod*"
  workflow_dispatch:
    inputs:
      all_tenants:
        description: 'Deploy to all tenants'
        type: boolean
        default: true
      adamahospital:
        description: 'Deploy adamahospital'
        type: boolean
        default: false
      anolehc:
        description: 'Deploy anolehc'
        type: boolean
        default: false
      biftuhc:
        description: 'Deploy biftuhc'
        type: boolean
        default: false
      bokuhc:
        description: 'Deploy bokuhc'
        type: boolean
        default: false
      dembelahc:
        description: 'Deploy dembelahc'
        type: boolean
        default: false
      gedahc:
        description: 'Deploy gedahc'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build & push ${{ matrix.service }} (${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/pipeline-fix') && 'latest' || 'prod' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      PUSH_IMAGE: ${{ (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/pipeline-fix' || (startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod'))) && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
      MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            file: ./Dockerfile
          - service: frontend
            context: .
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify prod tag is on main
        if: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod') }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Prod Docker images can only be published from commits on main."
            exit 1
          fi

      - name: Write Maven settings (if provided)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: printf '%s' "$MAVEN_SETTINGS_XML" > /tmp/maven-settings.xml

      - name: Validate Maven settings
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: |
          test -s /tmp/maven-settings.xml
          grep -q "<id>mks-repo</id>" /tmp/maven-settings.xml
          grep -q "<id>github-palladiumkennya-initializer</id>" /tmp/maven-settings.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAMESPACE }}/ethiopiaemr-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/pipeline-fix' }}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod') }}

      - name: Build and push ${{ matrix.service }} (with Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          no-cache-filters: ${{ matrix.service == 'backend' && 'dev' || '' }}

      - name: Build and push ${{ matrix.service }} (no Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          no-cache-filters: ${{ matrix.service == 'backend' && 'dev' || '' }}

  setup:
    name: Resolve tenant list
    runs-on: ubuntu-latest
    outputs:
      tenants: ${{ steps.filter.outputs.tenants }}
    steps:
      - name: Compute tenants to deploy
        id: filter
        run: |
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "${{ inputs.all_tenants }}" == "true" ]]; then
            echo 'tenants=["adamahospital","anolehc","biftuhc","bokuhc","dembelahc","gedahc"]' >> $GITHUB_OUTPUT
          else
            TENANTS=()
            [[ "${{ inputs.adamahospital }}" == "true" ]] && TENANTS+=("adamahospital")
            [[ "${{ inputs.anolehc }}"      == "true" ]] && TENANTS+=("anolehc")
            [[ "${{ inputs.biftuhc }}"      == "true" ]] && TENANTS+=("biftuhc")
            [[ "${{ inputs.bokuhc }}"       == "true" ]] && TENANTS+=("bokuhc")
            [[ "${{ inputs.dembelahc }}"    == "true" ]] && TENANTS+=("dembelahc")
            [[ "${{ inputs.gedahc }}"       == "true" ]] && TENANTS+=("gedahc")
            JSON=$(printf '%s\n' "${TENANTS[@]}" | jq -R . | jq -s -c .)
            echo "tenants=$JSON" >> $GITHUB_OUTPUT
          fi

  deploy:
    name: "Deploy ${{ matrix.tenant }}"
    runs-on: ubuntu-latest
    needs: [build, setup]
    if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/feature/pipeline-fix' || (startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod')) || github.event_name == 'workflow_dispatch' }}
    strategy:
      max-parallel: 3
      matrix:
        tenant: ${{ fromJson(needs.setup.outputs.tenants) }}
    steps:
      - name: Deploy ${{ matrix.tenant }} via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            NAMESPACE=ethioemr-tenant-${{ matrix.tenant }}
            FRONTEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/ethiopiaemr-frontend:latest
            BACKEND_IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/ethiopiaemr-backend:latest

            kubectl rollout restart deployment/${{ matrix.tenant }}-frontend -n $NAMESPACE
            kubectl rollout restart deployment/${{ matrix.tenant }}-backend -n $NAMESPACE
