name: Build & Push
run-name: "${{ github.event_name == 'workflow_dispatch' && format('Manual build · {0} by @{1}', github.ref_name, github.actor) || format('Build insa · {0} by @{1}', github.ref_name, github.actor) }}"

on:
  push:
    branches:
      - hotfix/security-fix
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build & push ${{ matrix.service }} (insa)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      PUSH_IMAGE: ${{ github.ref == 'refs/heads/hotfix/security-fix' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
      MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            file: ./Dockerfile
          - service: frontend
            context: .
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write Maven settings (if provided)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: printf '%s' "$MAVEN_SETTINGS_XML" > /tmp/maven-settings.xml

      - name: Validate Maven settings
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: test -s /tmp/maven-settings.xml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Restore backend Maven cache
        if: ${{ matrix.service == 'backend' }}
        id: m2-cache
        uses: actions/cache@v4
        with:
          path: m2-cache
          key: m2-${{ hashFiles('pom.xml', 'distro/pom.xml', 'distro/distro.properties', 'frontend/content-package-pom.xml', 'frontend/spa-assemble-config.json', 'frontend/spa-build-config.json', 'purge-volatile-maven-cache.sh') }}
          restore-keys: |
            m2-

      - name: Inject Maven cache into Buildx
        if: ${{ matrix.service == 'backend' }}
        uses: reproducible-containers/buildkit-cache-dance@v3.1.2
        with:
          cache-map: |
            {
              "m2-cache": "/root/.m2"
            }
          skip-extraction: ${{ steps.m2-cache.outputs.cache-hit }}

      - name: Log in to Docker Hub
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAMESPACE }}/ethiopiaemr-${{ matrix.service }}
          tags: |
            type=raw,value=insa
            type=sha

      - name: Build and push ${{ matrix.service }} (with Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          build-args: |
            CONTENT_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('distro/pom.xml', 'distro/distro.properties', 'frontend/content-package-pom.xml') }}
            FRONTEND_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('frontend/spa-assemble-config.json', 'frontend/spa-build-config.json', 'frontend/rename-packages.sh') }}
          no-cache: ${{ matrix.service == 'frontend' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push ${{ matrix.service }} (no Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            CONTENT_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('distro/pom.xml', 'distro/distro.properties', 'frontend/content-package-pom.xml') }}
            FRONTEND_CACHE_BUST=${{ github.run_id }}-${{ github.run_attempt }}-${{ hashFiles('frontend/spa-assemble-config.json', 'frontend/spa-build-config.json', 'frontend/rename-packages.sh') }}
          no-cache: ${{ matrix.service == 'frontend' }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
