name: Build & Push
run-name: "Build prod-test · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: [prod]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build & push ${{ matrix.service }} (prod-test)"
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      PUSH_IMAGE: ${{ github.ref == 'refs/heads/prod' && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
      MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            file: ./Dockerfile
          - service: frontend
            context: .
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write Maven settings (if provided)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: printf '%s' "$MAVEN_SETTINGS_XML" > /tmp/maven-settings.xml

      - name: Validate Maven settings
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: test -s /tmp/maven-settings.xml

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAMESPACE }}/ethiopiaemr-${{ matrix.service }}
          tags: |
            type=raw,value=prod-test
            type=sha

      - name: Build and push ${{ matrix.service }} (with Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml

      - name: Build and push ${{ matrix.service }} (no Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    name: "Restart EMR"
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Restart Dembela via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            NAMESPACE=ethioemr-tenant-dembelahc
            kubectl rollout restart deployment/dembelahc-frontend -n $NAMESPACE
            kubectl rollout restart deployment/dembelahc-backend -n $NAMESPACE
