name: Build & Deploy
run-name: "${{ github.ref == 'refs/heads/main' && 'Deploy latest' || 'Deploy prod' }} · ${{ github.ref_name }} by @${{ github.actor }}"

on:
  push:
    branches: [main]
    tags:
      - "*prod*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: "Build & push ${{ matrix.service }} (${{ github.ref == 'refs/heads/main' && 'latest' || 'prod' }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
      PUSH_IMAGE: ${{ (github.ref == 'refs/heads/main' || (startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod'))) && secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
      MAVEN_SETTINGS_XML: ${{ secrets.MAVEN_SETTINGS_XML }}
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            file: ./Dockerfile
          - service: frontend
            context: .
            file: ./frontend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify prod tag is on main
        if: ${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod') }}
        run: |
          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Prod Docker images can only be published from commits on main."
            exit 1
          fi

      - name: Write Maven settings (if provided)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        run: |
          cat > /tmp/maven-settings.xml <<'EOF'
          ${{ env.MAVEN_SETTINGS_XML }}
          EOF

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: ${{ env.PUSH_IMAGE == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.IMAGE_NAMESPACE }}/ethiopiaemr-${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=prod,enable=${{ startsWith(github.ref, 'refs/tags/') && contains(github.ref_name, 'prod') }}
            type=sha

      - name: Build and push ${{ matrix.service }} (with Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML != '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          secret-files: |
            m2settings=/tmp/maven-settings.xml
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push ${{ matrix.service }} (no Maven settings)
        if: ${{ env.MAVEN_SETTINGS_XML == '' }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: ${{ env.PUSH_IMAGE == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Deploy to tenants
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Restart deployments via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          password: ${{ secrets.VM_PASSWORD }}
          script: |
            kubectl rollout restart deployment/adamahospital-frontend -n ethioemr-tenant-adamahospital
            kubectl rollout restart deployment/adamahospital-backend -n ethioemr-tenant-adamahospital
            kubectl rollout restart deployment/anolehc-frontend -n ethioemr-tenant-anolehc
            kubectl rollout restart deployment/anolehc-backend -n ethioemr-tenant-anolehc

            kubectl rollout restart deployment/biftuhc-frontend -n ethioemr-tenant-biftuhc
            kubectl rollout restart deployment/biftuhc-backend -n ethioemr-tenant-biftuhc

            kubectl rollout restart deployment/bokuhc-frontend -n ethioemr-tenant-bokuhc
            kubectl rollout restart deployment/bokuhc-backend -n ethioemr-tenant-bokuhc

            kubectl rollout restart deployment/dembelahc-frontend -n ethioemr-tenant-dembelahc
            kubectl rollout restart deployment/dembelahc-backend -n ethioemr-tenant-dembelahc

            kubectl rollout restart deployment/gedahc-frontend -n ethioemr-tenant-gedahc
            kubectl rollout restart deployment/gedahc-backend -n ethioemr-tenant-gedahc
